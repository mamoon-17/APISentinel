openapi: 3.0.3
info:
  title: CodeMap API
  version: 1.0.0
  description: Tailored contract for detected CodeMap endpoints.
servers:
  - url: https://api.example.com
paths:
  /register:
    post:
      summary: Register a user account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "201":
          description: Account created

  /login:
    post:
      summary: Login with credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Login successful

  /logout:
    post:
      summary: Logout current session
      responses:
        "200":
          description: Logout successful

  /guest:
    post:
      summary: Create a guest session
      responses:
        "200":
          description: Guest session created

  /refresh:
    post:
      summary: Refresh authentication token
      responses:
        "200":
          description: Token refreshed

  /me:
    get:
      summary: Fetch current user profile
      responses:
        "200":
          description: Current user returned
          content:
            application/json:
              schema:
                type: object

  /upload:
    post:
      summary: Upload a file or asset
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Upload successful

  /analyze-snippet:
    post:
      summary: Analyze a code snippet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [snippet]
              properties:
                snippet:
                  type: string
      responses:
        "200":
          description: Analysis result returned
          content:
            application/json:
              schema:
                type: object

  /ingest:
    post:
      summary: Ingest processed payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Ingest complete

  /:
    get:
      summary: Service root status
      responses:
        "200":
          description: Service reachable
    post:
      summary: Service root trigger endpoint
      responses:
        "200":
          description: Trigger accepted

  /{param}:
    put:
      summary: Generic update route detected by scanner
      parameters:
        - name: param
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Update accepted
