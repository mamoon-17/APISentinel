openapi: 3.0.3
info:
  title: Processing Service API
  version: 1.0.0
  description: API contract for upload and processing pipeline endpoints.
servers:
  - url: https://api.example.com
paths:
  /upload:
    post:
      summary: Upload a file for processing
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Upload accepted
        "400":
          description: Invalid payload

  /analyze-snippet:
    post:
      summary: Analyze a text snippet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [snippet]
              properties:
                snippet:
                  type: string
      responses:
        "200":
          description: Analysis complete
          content:
            application/json:
              schema:
                type: object
                properties:
                  result:
                    type: string

  /ingest:
    post:
      summary: Ingest processed payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Ingestion successful

  /{param}:
    put:
      summary: Generic update endpoint
      parameters:
        - in: path
          name: param
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Update applied

  /:
    post:
      summary: Root-level process trigger
      responses:
        "200":
          description: Trigger accepted
    get:
      summary: Root-level health or info
      responses:
        "200":
          description: Service healthy
