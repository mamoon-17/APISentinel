openapi: 3.0.3
info:
  title: CodeMap Mixed Test API
  version: 1.0.0
  description: Intentionally mixed contract for testing In Spec, Not in Spec, missing_endpoint, and method_mismatch.
servers:
  - url: https://api.example.com
paths:
  /register:
    post:
      summary: Correct endpoint (expected in-spec)
      responses:
        "201":
          description: Created

  /logout:
    post:
      summary: Correct endpoint (expected in-spec)
      responses:
        "200":
          description: Logged out

  /me:
    get:
      summary: Correct endpoint (expected in-spec)
      responses:
        "200":
          description: Current user

  /login:
    get:
      summary: Intentionally wrong method to trigger method_mismatch (repo usually uses POST)
      responses:
        "200":
          description: Login page

  /users:
    get:
      summary: Spec-only endpoint to trigger missing_endpoint
      responses:
        "200":
          description: User list

  /analytics/report:
    post:
      summary: Another spec-only endpoint to trigger missing_endpoint
      responses:
        "200":
          description: Report generated
