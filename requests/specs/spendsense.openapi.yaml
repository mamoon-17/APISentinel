openapi: 3.0.3
info:
  title: SpendSense API
  version: 1.1.0
  description: Contract aligned with observed SpendSense repository routes.
servers:
  - url: https://api.example.com
paths:
  /connections:
    get:
      summary: List user connections
      responses:
        "200":
          description: Connection list
    post:
      summary: Create connection
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Connection created
    patch:
      summary: Update connection
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Connection updated

  /ai/chat:
    post:
      summary: Chat completion endpoint
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Chat response

  /ai/insights:
    get:
      summary: Get AI insights
      responses:
        "200":
          description: Insights payload

  /auth/login:
    post:
      summary: Login
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Login success

  /auth/signup:
    post:
      summary: Sign up
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Account created

  /auth/change-password:
    post:
      summary: Change password
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Password changed

  /user/profile:
    get:
      summary: Get user profile
      responses:
        "200":
          description: Profile payload
    put:
      summary: Update user profile
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Profile updated

  /user/account:
    delete:
      summary: Delete current user account
      responses:
        "204":
          description: Account deleted

  /user-profiles:
    get:
      summary: List user profiles
      responses:
        "200":
          description: Profile list
    post:
      summary: Create user profile
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Profile created

  /user-profiles/{param}:
    get:
      summary: Get user profile by id
      parameters:
        - name: param
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Profile payload
    delete:
      summary: Delete user profile by id
      parameters:
        - name: param
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Profile deleted

  /user-profiles/by-user/{param}:
    get:
      summary: Get profiles by user id
      parameters:
        - name: param
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Profiles payload

  /categories:
    get:
      summary: List categories
      responses:
        "200":
          description: Category list
    post:
      summary: Create category
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Category created

  /categories/custom:
    post:
      summary: Create custom category
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Custom category created

  /categories/{param}:
    get:
      summary: Get category by id
      parameters:
        - name: param
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Category payload
    delete:
      summary: Delete category by id
      parameters:
        - name: param
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Category deleted

  /categories/type/{param}:
    get:
      summary: Get categories by type
      parameters:
        - name: param
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Categories by type

  /budgets:
    get:
      summary: List budgets
      responses:
        "200":
          description: Budget list
    post:
      summary: Create budget
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Budget created

  /budgets/enhanced/analytics:
    get:
      summary: Get budget analytics
      responses:
        "200":
          description: Analytics payload

  /budgets/{param}:
    get:
      summary: Get budget by id
      parameters:
        - name: param
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Budget payload
    patch:
      summary: Update budget by id
      parameters:
        - name: param
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Budget updated
    delete:
      summary: Delete budget by id
      parameters:
        - name: param
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Budget deleted

  /budgets/{param}/reset-spending:
    patch:
      summary: Reset budget spending
      parameters:
        - name: param
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Spending reset

  /budgets/{param}/invite:
    post:
      summary: Invite collaborator to budget
      parameters:
        - name: param
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Invitation sent

  /expenses:
    get:
      summary: List expenses
      responses:
        "200":
          description: Expense list
    post:
      summary: Create expense
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Expense created

  /expenses/summary:
    get:
      summary: Expense summary
      responses:
        "200":
          description: Summary payload

  /expenses/search:
    get:
      summary: Search expenses
      responses:
        "200":
          description: Search results

  /expenses/date-range:
    get:
      summary: Expenses by date range
      responses:
        "200":
          description: Date range results

  /expenses/{param}:
    get:
      summary: Get expense by id
      parameters:
        - name: param
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Expense payload
    patch:
      summary: Update expense by id
      parameters:
        - name: param
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Expense updated
    delete:
      summary: Delete expense by id
      parameters:
        - name: param
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Expense deleted

  /expenses/{param}/unlink:
    patch:
      summary: Unlink expense relation
      parameters:
        - name: param
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Expense unlinked

  /savings/goals:
    get:
      summary: List savings goals
      responses:
        "200":
          description: Goals list
    post:
      summary: Create savings goal
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Goal created

  /savings/goals/summary:
    get:
      summary: Savings goals summary
      responses:
        "200":
          description: Goals summary

  /invitations:
    post:
      summary: Create invitation
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Invitation created

  /conversations:
    get:
      summary: List conversations
      responses:
        "200":
          description: Conversation list
    post:
      summary: Create conversation
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "201":
          description: Conversation created
