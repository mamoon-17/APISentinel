openapi: 3.0.3
info:
  title: Auth Service API
  version: 1.0.0
  description: API contract for authentication and session endpoints.
servers:
  - url: https://api.example.com
paths:
  /register:
    post:
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
      responses:
        "201":
          description: User registered
        "400":
          description: Validation failed

  /login:
    post:
      summary: Login with credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        "200":
          description: Login successful
        "401":
          description: Invalid credentials

  /logout:
    post:
      summary: Logout current session
      responses:
        "200":
          description: Logout successful

  /refresh:
    post:
      summary: Refresh access token
      responses:
        "200":
          description: Token refreshed
        "401":
          description: Unauthorized

  /me:
    get:
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  email:
                    type: string
                    format: email
        "401":
          description: Unauthorized

  /guest:
    post:
      summary: Start guest session
      responses:
        "200":
          description: Guest session created
