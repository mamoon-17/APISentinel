openapi: 3.0.3
info:
  title: User Service API
  version: 1.0.0
  description: API contract for user CRUD-style endpoints.
servers:
  - url: https://api.example.com
paths:
  /users:
    get:
      summary: List users
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    email:
                      type: string
                      format: email
    post:
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
      responses:
        "201":
          description: User created
        "400":
          description: Validation failed

  /users/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
    get:
      summary: Get user by id
      responses:
        "200":
          description: User record
        "404":
          description: User not found
    put:
      summary: Update user by id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
      responses:
        "200":
          description: User updated
        "404":
          description: User not found
    delete:
      summary: Delete user by id
      responses:
        "204":
          description: User deleted
        "404":
          description: User not found
